<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kstarid.cloud - Disposable Email</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{max-width:700px;width:100%}
h1{text-align:center;font-size:1.8rem;margin-bottom:4px}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:24px;font-size:.9rem}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#38bdf8;color:#0f172a}.btn-primary:hover{background:#0ea5e9}
.btn-danger{background:#f87171;color:#fff;padding:8px 14px;font-size:.8rem}
.btn-sm{padding:6px 12px;font-size:.8rem;background:#475569;color:#fff;border-radius:6px}
#generate{width:100%;margin-bottom:20px}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.addr-box{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.addr{font-family:monospace;font-size:1.1rem;color:#38bdf8;word-break:break-all;flex:1;background:#0f172a;padding:10px 14px;border-radius:8px}
.meta{display:flex;justify-content:space-between;align-items:center;color:#94a3b8;font-size:.85rem;margin-top:8px;flex-wrap:wrap;gap:8px}
.msg-list{list-style:none}
.msg-item{padding:14px;border-bottom:1px solid #334155;cursor:pointer;transition:background .15s;border-radius:8px}
.msg-item:hover{background:#334155}
.msg-from{font-weight:600;color:#38bdf8;font-size:.85rem}
.msg-subject{color:#f1f5f9;margin:4px 0 2px}
.msg-date{color:#64748b;font-size:.75rem}
.detail-header{margin-bottom:16px}
.detail-from{color:#38bdf8;margin:8px 0}
.detail-date{color:#64748b;font-size:.85rem}
.detail-body{background:#0f172a;padding:16px;border-radius:8px;white-space:pre-wrap;line-height:1.6;max-height:400px;overflow-y:auto}
.empty{text-align:center;color:#64748b;padding:40px}
.hidden{display:none}
.back-btn{background:none;border:none;color:#38bdf8;cursor:pointer;font-size:.9rem;margin-bottom:12px}
#inbox-count{background:#334155;padding:2px 10px;border-radius:12px;font-size:.8rem}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;z-index:999;transition:opacity .3s}
.settings-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0}
.settings-toggle:hover{opacity:.8}
.domain-row{display:flex;align-items:center;gap:10px}
.domain-row input{flex:1;padding:8px 12px;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#f1f5f9;font-size:.9rem}
.domain-msg{margin-top:8px;font-size:.8rem}
</style>
</head>
<body>
<div class="container">
<h1>&#128232; kstarid.cloud</h1>
<p class="subtitle">Disposable email yang auto-expire. Tanpa signup, tanpa tracking.</p>
<button id="generate" class="btn btn-primary" onclick="createInbox()">&#127880; Generate New Email</button>
<div id="inbox-area" class="hidden">
<div class="card">
<div class="addr-box">
<div class="addr" id="addr-display"></div>
<button id="copyBtn" class="btn-sm" onclick="copyAddr()">&#128203; Copy</button>
</div>
<div class="meta">
<span>&#9201; Expires in: <strong id="timer"></strong></span>
<span>&#128260; Auto-refresh 5s</span>
<button class="btn btn-danger" onclick="deleteInbox()">&#128465; Delete</button>
</div>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<h2>&#128229; Inbox <span id="inbox-count">0</span></h2>
</div>
<div id="msg-list-view">
<div id="empty-state" class="empty">
<p>No messages yet. Send an email to your address above.</p>
</div>
<ul id="msg-list" class="msg-list hidden"></ul>
</div>
<div id="msg-detail-view" class="hidden">
<button class="back-btn" onclick="backToList()">&#8592; Back to list</button>
<div class="detail-header">
<h3 id="detail-subject"></h3>
<div class="detail-from" id="detail-from"></div>
<div class="detail-date" id="detail-date"></div>
</div>
<div class="detail-body" id="detail-body"></div>
</div>
</div>
</div>

<!-- Settings Panel -->
<div class="card">
<div class="settings-toggle" onclick="toggleSettings()">
<span style="color:#94a3b8;font-size:.85rem">&#9881; Settings</span>
<span id="settings-arrow" style="color:#94a3b8">&#9660;</span>
</div>
<div id="settings-panel" class="hidden" style="margin-top:12px;padding-top:12px;border-top:1px solid #334155">
<div class="domain-row">
<label style="color:#94a3b8;font-size:.85rem;white-space:nowrap">Domain:</label>
<input id="domainInput" type="text" placeholder="kstarid.cloud">
<button class="btn-sm" style="background:#38bdf8;color:#0f172a;font-weight:600" onclick="changeDomain()">Save</button>
</div>
<p style="color:#64748b;font-size:.75rem;margin-top:8px">Ganti domain = update Postfix + backend. Update DNS MX record juga!</p>
<div id="domain-msg" class="domain-msg"></div>
</div>
</div>

</div>

<script>
var API = '/api';
var currentAddr = localStorage.getItem('tempmail_addr') || '';
var timerInterval = null;
var pollInterval = null;
var expiresAt = null;

function api(path, opts) {
  opts = opts || {};
  return fetch(API + path, Object.assign({}, opts, {headers: Object.assign({'Content-Type':'application/json'}, opts.headers || {})}))
    .then(function(r) { if (!r.ok) return r.text().then(function(t) { throw new Error(t); }); return r.json(); });
}

function createInbox() {
  api('/inbox/create', {method:'POST'}).then(function(d) {
    currentAddr = d.address;
    localStorage.setItem('tempmail_addr', currentAddr);
    expiresAt = new Date(d.expires_at + 'Z');
    showInbox(d);
    startPolling();
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function showInbox(data) {
  document.getElementById('inbox-area').classList.remove('hidden');
  document.getElementById('addr-display').textContent = data.address;
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    var ms = expiresAt.getTime() - Date.now();
    if (ms <= 0) { document.getElementById('timer').textContent = 'EXPIRED'; clearInterval(timerInterval); return; }
    var m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
    document.getElementById('timer').textContent = m + 'm ' + String(s).padStart(2,'0') + 's';
  }, 1000);
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 5000);
  loadMessages();
}

function loadMessages() {
  if (!currentAddr) return Promise.resolve();
  return api('/inbox/' + encodeURIComponent(currentAddr) + '/messages').then(function(msgs) {
    document.getElementById('inbox-count').textContent = msgs.length;
    var list = document.getElementById('msg-list');
    var empty = document.getElementById('empty-state');
    if (msgs.length === 0) { list.classList.add('hidden'); empty.classList.remove('hidden'); }
    else {
      empty.classList.add('hidden'); list.classList.remove('hidden');
      list.innerHTML = msgs.map(function(m) {
        return '<li class="msg-item" onclick="viewMessage('+m.id+')"><div class="msg-from">'+esc(m.from_address)+'</div><div class="msg-subject">'+esc(m.subject)+'</div><div class="msg-date">'+new Date(m.received_at+'Z').toLocaleString()+'</div></li>';
      }).join('');
    }
  }).catch(function(e) {
    if (e.message && e.message.indexOf('404') !== -1) { localStorage.removeItem('tempmail_addr'); currentAddr = ''; document.getElementById('inbox-area').classList.add('hidden'); }
  });
}

function viewMessage(id) {
  api('/inbox/' + encodeURIComponent(currentAddr) + '/messages/' + id).then(function(m) {
    document.getElementById('msg-list-view').classList.add('hidden');
    document.getElementById('msg-detail-view').classList.remove('hidden');
    document.getElementById('detail-subject').textContent = m.subject || '(no subject)';
    document.getElementById('detail-from').textContent = 'From: ' + m.from_address;
    document.getElementById('detail-date').textContent = new Date(m.received_at+'Z').toLocaleString();
    document.getElementById('detail-body').textContent = m.body_text || m.body_html || '(empty)';
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function backToList() { document.getElementById('msg-detail-view').classList.add('hidden'); document.getElementById('msg-list-view').classList.remove('hidden'); }

function deleteInbox() {
  if (!currentAddr) return;
  api('/inbox/' + encodeURIComponent(currentAddr), {method:'DELETE'}).then(function() {
    localStorage.removeItem('tempmail_addr'); currentAddr = '';
    document.getElementById('inbox-area').classList.add('hidden');
    if (pollInterval) clearInterval(pollInterval); if (timerInterval) clearInterval(timerInterval);
  }).catch(function(e) { alert('Error: ' + e.message); });
}

function copyAddr() {
  var addr = currentAddr;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(addr).then(showToast).catch(function() { fallbackCopy(addr); });
  } else {
    fallbackCopy(addr);
  }
}

function fallbackCopy(text) {
  var t = document.createElement('textarea');
  t.value = text;
  t.style.position = 'fixed';
  t.style.left = '-9999px';
  document.body.appendChild(t);
  t.select();
  try { document.execCommand('copy'); showToast(); } catch(e) { alert('Copy failed: ' + text); }
  document.body.removeChild(t);
}

function showToast() {
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = 'Copied!';
  document.body.appendChild(toast);
  setTimeout(function() { toast.style.opacity = '0'; }, 1500);
  setTimeout(function() { if (toast.parentNode) document.body.removeChild(toast); }, 1800);
}

function toggleSettings() {
  var panel = document.getElementById('settings-panel');
  var arrow = document.getElementById('settings-arrow');
  if (panel.classList.contains('hidden')) {
    panel.classList.remove('hidden');
    arrow.innerHTML = '&#9650;';
    fetch('/api/settings/domain').then(function(r){return r.json()}).then(function(d){
      document.getElementById('domainInput').value = d.domain;
    });
  } else {
    panel.classList.add('hidden');
    arrow.innerHTML = '&#9660;';
  }
}

function changeDomain() {
  var newDomain = document.getElementById('domainInput').value.trim();
  if (!newDomain) return alert('Domain tidak boleh kosong');
  if (newDomain.indexOf('.') === -1) return alert('Domain harus ada titik');
  if (!confirm('Ganti domain ke ' + newDomain + '?\n\nIni akan mengubah:\n- Postfix config\n- Email address format\n\nPastikan DNS MX sudah diupdate!')) return;
  
  fetch('/api/settings/domain', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({domain: newDomain})
  }).then(function(r){return r.json()}).then(function(d){
    var msg = document.getElementById('domain-msg');
    if (d.ok) {
      msg.style.color = '#22c55e';
      msg.textContent = 'Domain changed: ' + d.old + ' -> ' + d.new;
      localStorage.removeItem('tempmail_addr');
      setTimeout(function(){ location.reload(); }, 2000);
    } else {
      msg.style.color = '#f87171';
      msg.textContent = 'Error: ' + (d.detail || 'Unknown');
    }
  }).catch(function(e) {
    document.getElementById('domain-msg').style.color = '#f87171';
    document.getElementById('domain-msg').textContent = 'Error: ' + e.message;
  });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

if (currentAddr) {
  api('/inbox/' + encodeURIComponent(currentAddr)).then(function(d) {
    expiresAt = new Date(d.expires_at + 'Z');
    showInbox(d);
    startPolling();
  }).catch(function() { localStorage.removeItem('tempmail_addr'); currentAddr = ''; });
}
</script>
</body>
</html>
